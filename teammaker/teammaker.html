<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="app_title">무작위 팀 나누기 - Zeze Hub</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="teammaker.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6200EE',
                        primaryLight: '#BB86FC',
                        secondary: '#03DAC6', // Teal for Team Maker
                        surface: '#FFFFFF',
                        background: '#F8F9FA',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-gray-900 font-sans antialiased min-h-screen flex flex-col">

    <!-- Navigation Bar -->
    <nav class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-md border-b border-gray-200 z-50">
        <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <a href="../index.html" class="p-2 -ml-2 rounded-full hover:bg-gray-100 focus:outline-none flex items-center text-primary">
                    <span class="material-icons">arrow_back</span>
                </a>
                <span class="text-xl font-bold text-primary" data-key="app_name">Team Maker</span>
            </div>
            <div class="flex items-center gap-1">
                <button id="menu-toggle" class="p-2 rounded-full hover:bg-gray-100 focus:outline-none">
                    <span class="material-icons text-gray-600">menu</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Sidebar Menu (Omitted for brevity, standard Zeze Hub sidebar) -->
    <div id="sidebar-menu" class="fixed top-0 right-0 h-full w-64 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-50 border-l border-gray-100">
        <div class="flex items-center justify-between p-4 border-b border-gray-100">
            <span class="text-lg font-medium" data-key="menu_sidebar_title">메뉴</span>
            <button id="close-menu" class="p-2 rounded-full hover:bg-gray-100">
                <span class="material-icons">close</span>
            </button>
        </div>
        <ul class="p-4 space-y-2 text-sm text-gray-600">
            <li><a href="teammaker-guide.html" class="block w-full text-left p-2 rounded-md hover:bg-gray-50" data-key="guide_title">사용 가이드</a></li>
            <li><a href="../privacy.html" class="block w-full text-left p-2 rounded-md hover:bg-gray-50" data-key="privacy_policy">개인정보처리방침</a></li>
            <li><a href="../terms.html" class="block w-full text-left p-2 rounded-md hover:bg-gray-50" data-key="terms_of_service">서비스 약관</a></li>
            <li class="py-2"><hr class="border-gray-100"></li>
            <li>
                <span class="block text-[10px] text-gray-400 mb-2 uppercase tracking-widest" data-key="language_select_label">Language</span>
                <div class="grid grid-cols-2 gap-2">
                    <button class="lang-btn p-2 rounded-md bg-primary text-white font-bold" data-lang="ko">한국어</button>
                    <button class="lang-btn p-2 rounded-md bg-gray-50 border border-gray-200" data-lang="en">English</button>
                </div>
            </li>
        </ul>
    </div>
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/20 z-40 hidden"></div>

    <!-- Main Content -->
    <main class="max-w-md mx-auto py-24 px-4 w-full flex-grow flex flex-col">
        <!-- Hero Section -->
        <section class="text-center mb-8">
            <h1 class="text-3xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-b from-primary to-primaryLight" data-key="main_title">무작위 팀 나누기</h1>
            <p class="text-sm text-gray-500" data-key="main_description">명단을 입력하고 공정하게 팀을 나눠보세요.</p>
        </section>

        <!-- Input Section -->
        <section id="setup-section" class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-8 space-y-6">
            <!-- Instruction Box -->
            <div class="bg-primary/5 border border-primary/10 p-4 rounded-2xl flex gap-3 items-start">
                <span class="material-icons text-primary text-xl">priority_high</span>
                <div>
                    <p class="text-xs font-black text-primary mb-1 uppercase tracking-tight" data-key="input_notice_title">필수 확인</p>
                    <p class="text-[11px] text-gray-600 leading-relaxed" data-key="input_notice_desc">참가자 이름을 <b>줄바꿈(Enter)</b> 또는 <b>쉼표(,)</b>로 구분하여 입력해주세요.</p>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3" data-key="input_label">참가자 명단</label>
                    <textarea id="player-list-input" class="w-full h-32 p-4 rounded-2xl bg-gray-50 border border-gray-100 focus:border-primary outline-none text-sm transition-all resize-none no-scrollbar" placeholder="예) 강백호, 서태웅, 채치수..."></textarea>
                    <div class="mt-2 text-right">
                        <span class="text-xs text-gray-500 font-medium"><b id="input-count" class="text-primary font-bold">0</b> <span data-key="count_unit">명 입력됨</span></span>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3" data-key="team_names_label">팀 이름 지정 (선택 사항)</label>
                    <textarea id="team-names-input" class="w-full h-20 p-4 rounded-2xl bg-gray-50 border border-gray-100 focus:border-primary outline-none text-sm transition-all resize-none no-scrollbar" placeholder="예) A팀, B팀, C팀 (미입력 시 기본 팀명 사용)"></textarea>
                </div>
            </div>

            <!-- Mode Selection -->
            <div class="grid grid-cols-2 gap-2 p-1 bg-gray-100 rounded-2xl">
                <button id="mode-team-count" class="mode-btn p-3 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-primary" data-mode="teamCount">
                    <span data-key="mode_team_count">팀 개수 기준</span>
                </button>
                <button id="mode-member-count" class="mode-btn p-3 rounded-xl text-xs font-bold transition-all text-gray-500" data-mode="memberCount">
                    <span data-key="mode_member_count">팀원 수 기준</span>
                </button>
            </div>

            <!-- Value Control -->
            <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl border border-gray-100">
                <span id="control-label" class="font-bold text-gray-700 text-sm" data-key="label_team_count">나눌 팀 개수</span>
                <div class="flex items-center bg-white rounded-full px-3 py-1 shadow-sm border border-gray-100">
                    <button id="val-minus" class="material-icons text-gray-400 hover:text-primary transition-colors text-lg">remove</button>
                    <span id="target-value" class="mx-4 font-bold text-primary w-6 text-center">2</span>
                    <button id="val-plus" class="material-icons text-gray-400 hover:text-primary transition-colors text-lg">add</button>
                </div>
            </div>

            <button id="make-teams-btn" class="w-full bg-primary text-white py-4 rounded-2xl text-lg font-bold shadow-lg shadow-primary/20 hover:bg-primaryLight transition-all active:scale-95 flex items-center justify-center gap-2">
                <span class="material-icons">groups</span>
                <span data-key="make_btn">팀 나누기 시작!</span>
            </button>
        </section>

        <!-- Result Stage -->
        <section id="result-stage" class="hidden space-y-6">
            <div id="teams-container" class="space-y-4">
                <!-- Team cards will be here -->
            </div>

            <div class="flex gap-3">
                <button id="reset-btn" class="flex-1 bg-gray-100 text-gray-600 py-4 rounded-2xl font-bold hover:bg-gray-200 transition-all active:scale-95 flex items-center justify-center gap-2">
                    <span class="material-icons">edit</span>
                    <span data-key="reset_btn">명단 수정</span>
                </button>
                <button id="reshuffle-btn" class="flex-1 bg-secondary text-white py-4 rounded-2xl font-bold shadow-lg shadow-secondary/20 hover:opacity-90 transition-all active:scale-95 flex items-center justify-center gap-2">
                    <span class="material-icons">cached</span>
                    <span data-key="reshuffle_btn">다시 나누기</span>
                </button>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="py-8 text-center mt-auto">
        <p class="text-[10px] text-gray-400" data-key="footer_copyright">© 2024 Zeze Decision Hub.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="teammaker.js" defer></script>

</body>
</html>
