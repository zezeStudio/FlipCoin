<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="app_title">카드 뒤집기 - Zeze Hub</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="cardflip.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6200EE',
                        primaryLight: '#BB86FC',
                        secondary: '#FF0266', // Pink for Card Flip
                        surface: '#FFFFFF',
                        background: '#F8F9FA',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-gray-900 font-sans antialiased min-h-screen flex flex-col">

    <!-- Navigation Bar -->
    <nav class="fixed top-0 left-0 right-0 bg-white border-b border-gray-200 z-50">
        <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <a href="../index.html" class="p-2 -ml-2 rounded-full hover:bg-gray-100 focus:outline-none flex items-center text-primary">
                    <span class="material-icons">arrow_back</span>
                </a>
                <span class="text-xl font-bold text-primary" data-key="app_name">Card Flip</span>
            </div>
            <div class="flex items-center gap-1">
                <button id="sound-toggle" class="p-2 rounded-full hover:bg-gray-100 focus:outline-none transition-colors">
                    <span class="material-icons text-gray-600" id="sound-icon">volume_up</span>
                </button>
                <button id="menu-toggle" class="p-2 rounded-full hover:bg-gray-100 focus:outline-none">
                    <span class="material-icons text-gray-600">menu</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Sidebar Menu -->
    <div id="sidebar-menu" class="fixed top-0 right-0 h-full w-64 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-50 border-l border-gray-100">
        <div class="flex items-center justify-between p-4 border-b border-white/10">
            <span class="text-lg font-medium" data-key="menu_sidebar_title">메뉴</span>
            <button id="close-menu" class="p-2 rounded-full hover:bg-gray-100">
                <span class="material-icons">close</span>
            </button>
        </div>
        <ul class="p-4 space-y-2 text-sm text-gray-600">
            <li><a href="cardflip-guide.html" class="block w-full text-left p-2 rounded-md hover:bg-gray-50" data-key="guide_title">사용 가이드</a></li>
            <li class="py-2"><hr class="border-gray-100"></li>
            <li>
                <span class="block text-[10px] text-gray-400 mb-2 uppercase tracking-widest" data-key="language_select_label">Language</span>
                <div class="grid grid-cols-2 gap-2">
                    <button class="lang-btn p-2 rounded-md bg-primary text-white font-bold" data-lang="ko">한국어</button>
                    <button class="lang-btn p-2 rounded-md bg-gray-50 border border-gray-200" data-lang="en">English</button>
                </div>
            </li>
        </ul>
    </div>
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/20 z-40 hidden"></div>

    <!-- Main Content -->
    <main class="max-w-md mx-auto py-24 px-4 w-full flex-grow flex flex-col">
        <!-- Hero Section -->
        <section class="text-center mb-8">
            <h1 class="text-3xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-b from-primary to-primaryLight" data-key="main_title">행운의 카드 뒤집기</h1>
            <p class="text-sm text-gray-500 mb-4" data-key="main_description">숨겨진 카드를 선택하고 결과를 확인하세요.</p>
            
            <div class="bg-primary/10 border border-primary/10 rounded-2xl p-3 mb-2 animate-pulse">
                <p class="text-[11px] text-primary font-bold leading-relaxed" data-key="top_guide_notice">💡 카드를 순서 정하기, 직접 내기 입력, 운세 확인 등 다양한 방법으로 응용해 보세요! 자세한 설명은 페이지 하단 가이드를 참고하세요.</p>
            </div>
        </section>

        <!-- Setup Section -->
        <section id="setup-section" class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-8 space-y-6">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest" data-key="setup_title">설정</h2>
            <!-- Card Content Modes -->
            <div class="grid grid-cols-2 gap-2 p-1 bg-gray-100 rounded-2xl">
                <button class="mode-btn p-3 rounded-xl text-[10px] font-bold transition-all bg-white shadow-sm text-primary" data-mode="number">
                    <span data-key="mode_number">순서 (숫자)</span>
                </button>
                <button class="mode-btn p-3 rounded-xl text-[10px] font-bold transition-all text-gray-500" data-mode="custom">
                    <span data-key="mode_custom">직접 입력</span>
                </button>
                <button class="mode-btn p-3 rounded-xl text-[10px] font-bold transition-all text-gray-500" data-mode="icon">
                    <span data-key="mode_icon">아이콘 점괘</span>
                </button>
                <button class="mode-btn p-3 rounded-xl text-[10px] font-bold transition-all text-gray-500" data-mode="advice">
                    <span data-key="mode_advice">심리/조언</span>
                </button>
            </div>

            <!-- Dynamic Mode Description -->
            <div class="bg-gray-50/50 p-4 rounded-2xl border border-gray-100/50">
                <p id="mode-description" class="text-xs text-gray-500 leading-relaxed text-center"></p>
            </div>

            <!-- Participant Setup (Shown in number and custom modes) -->
            <div id="player-setup-area" class="space-y-4">
                <div class="flex justify-between items-center">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest" data-key="player_label">참가자 명단</label>
                    <div class="flex items-center bg-gray-100 rounded-full px-2 py-0.5 border border-gray-200">
                        <button id="player-minus" class="material-icons text-gray-400 hover:text-primary text-base">remove</button>
                        <span id="player-count-display" class="mx-3 font-bold text-primary w-4 text-center text-xs">4</span>
                        <button id="player-plus" class="material-icons text-gray-400 hover:text-primary text-base">add</button>
                    </div>
                </div>
                <div id="player-inputs-list" class="space-y-2 max-h-[200px] overflow-y-auto no-scrollbar pr-1">
                    <!-- Dynamic player inputs -->
                </div>
            </div>

            <!-- Custom Card Setup (Shown only in 'custom' mode) -->
            <div id="custom-setup-area" class="hidden space-y-4 pt-4 border-t border-gray-100">
                <div class="flex justify-between items-center">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest" data-key="custom_label">카드 내용 입력</label>
                    <div id="custom-count-control" class="flex items-center bg-gray-100 rounded-full px-2 py-0.5 border border-gray-200">
                        <button id="card-minus" class="material-icons text-gray-400 hover:text-secondary text-base">remove</button>
                        <span id="card-count-display" class="mx-3 font-bold text-secondary w-4 text-center text-xs">4</span>
                        <button id="card-plus" class="material-icons text-gray-400 hover:text-secondary text-base">add</button>
                    </div>
                </div>
                <div id="custom-inputs-list" class="space-y-2 max-h-[200px] overflow-y-auto no-scrollbar pr-1">
                    <!-- Dynamic custom content inputs -->
                </div>
            </div>

            <!-- Simple Card Count (Shown only in icon/advice modes) -->
            <div id="simple-count-area" class="hidden flex justify-between items-center bg-gray-50 p-4 rounded-2xl border border-gray-100">
                <span class="font-bold text-gray-700 text-sm" data-key="label_card_count">카드 개수</span>
                <div class="flex items-center bg-white rounded-full px-3 py-1 shadow-sm border border-gray-100">
                    <button id="simple-minus" class="material-icons text-gray-400 hover:text-primary transition-colors text-lg">remove</button>
                    <span id="simple-count-display" class="mx-4 font-bold text-primary w-6 text-center">4</span>
                    <button id="simple-plus" class="material-icons text-gray-400 hover:text-primary transition-colors text-lg">add</button>
                </div>
            </div>

            <button id="start-btn" class="w-full bg-primary text-white py-4 rounded-2xl text-lg font-bold shadow-lg shadow-primary/20 hover:bg-primaryLight transition-all active:scale-95 flex items-center justify-center gap-2">
                <span class="material-icons">style</span>
                <span data-key="start_btn">카드 셔플하기</span>
            </button>
        </section>

        <!-- Game Stage -->
        <section id="game-stage" class="hidden flex flex-col items-center w-full">
            <div id="instruction-bar" class="w-full mb-4 bg-primary text-white p-4 rounded-2xl text-center shadow-md animate-pulse">
                <p class="text-sm font-bold" id="game-instruction-text"></p>
            </div>

            <div id="cards-container" class="grid grid-cols-2 gap-4 w-full p-4 bg-white rounded-3xl shadow-inner border border-gray-100 min-h-[300px]">
                <!-- Cards -->
            </div>

            <div class="flex gap-3 w-full mt-8">
                <button id="reset-btn" class="flex-1 bg-gray-100 text-gray-600 py-4 rounded-2xl font-bold hover:bg-gray-200 transition-all active:scale-95 flex items-center justify-center gap-2">
                    <span class="material-icons text-lg">refresh</span>
                    <span data-key="reset_btn">초기화</span>
                </button>
                <button id="reveal-all-btn" class="flex-1 bg-secondary text-white py-4 rounded-2xl font-bold shadow-lg shadow-secondary/20 hover:opacity-90 transition-all active:scale-95 flex items-center justify-center gap-2">
                    <span class="material-icons text-lg">visibility</span>
                    <span data-key="reveal_all_btn">결과 공개</span>
                </button>
            </div>
        </section>

        <!-- Story Result Section -->
        <section id="story-result-section" class="hidden mt-8">
            <div class="bg-white p-8 rounded-[32px] border border-gray-100 shadow-xl text-center space-y-4 animate-slideUp">
                <div id="story-icon-container" class="w-20 h-20 bg-primary/10 rounded-3xl flex items-center justify-center mx-auto mb-2">
                    <span id="story-icon" class="material-icons text-5xl text-primary">auto_fix_high</span>
                </div>
                <h3 id="story-title" class="text-2xl font-black text-gray-800 leading-tight"></h3>
                <p id="story-desc" class="text-gray-500 leading-relaxed text-sm"></p>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="py-12 text-center mt-auto border-t border-gray-100">
        <div class="flex justify-center gap-6 mb-6">
            <a href="../privacy.html" class="text-[11px] text-gray-400 hover:text-primary transition-colors" data-key="privacy_policy">개인정보처리방침</a>
            <a href="../terms.html" class="text-[11px] text-gray-400 hover:text-primary transition-colors" data-key="terms_of_service">서비스 약관</a>
        </div>
        <p class="text-[10px] text-gray-400 mb-2" data-key="fortune_disclaimer">※ 본 서비스의 결과는 재미로만 즐겨주시기 바랍니다.</p>
        <p class="text-[10px] text-gray-400" data-key="footer_copyright">© 2024 Zeze Decision Hub.</p>
    </footer>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="cardflip.js" defer></script>

</body>
</html>
