<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="app_title">운명의 사다리 - Zeze Hub</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="ladderclimb.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6200EE',
                        primaryLight: '#BB86FC',
                        secondary: '#FF9800', // Orange for Ladder
                        surface: '#FFFFFF',
                        background: '#F8F9FA',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-gray-900 font-sans antialiased min-h-screen flex flex-col">

    <!-- Navigation Bar -->
    <nav class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-md border-b border-gray-200 z-50">
        <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <a href="../index.html" class="p-2 -ml-2 rounded-full hover:bg-gray-100 focus:outline-none flex items-center text-primary">
                    <span class="material-icons">arrow_back</span>
                </a>
                <span class="text-xl font-bold text-primary" data-key="app_name">Ladder Climb</span>
            </div>
            <div class="flex items-center gap-1">
                <button id="sound-toggle" class="p-2 rounded-full hover:bg-gray-100 focus:outline-none transition-colors">
                    <span class="material-icons text-gray-600" id="sound-icon">volume_up</span>
                </button>
                <button id="menu-toggle" class="p-2 rounded-full hover:bg-gray-100 focus:outline-none">
                    <span class="material-icons text-gray-600">menu</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Sidebar Menu -->
    <div id="sidebar-menu" class="fixed top-0 right-0 h-full w-64 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-50 border-l border-gray-100">
        <div class="flex items-center justify-between p-4 border-b border-gray-100">
            <span class="text-lg font-medium" data-key="menu_sidebar_title">메뉴</span>
            <button id="close-menu" class="p-2 rounded-full hover:bg-gray-100">
                <span class="material-icons">close</span>
            </button>
        </div>
        <ul class="p-4 space-y-2 text-sm text-gray-600">
            <li><a href="#" class="block w-full text-left p-2 rounded-md hover:bg-gray-50" data-key="guide_title">사용 가이드</a></li>
            <li><a href="../privacy.html" class="block w-full text-left p-2 rounded-md hover:bg-gray-50" data-key="privacy_policy">개인정보처리방침</a></li>
            <li><a href="../terms.html" class="block w-full text-left p-2 rounded-md hover:bg-gray-50" data-key="terms_of_service">서비스 약관</a></li>
            <li class="py-2"><hr class="border-gray-100"></li>
            <li>
                <span class="block text-[10px] text-gray-400 mb-2 uppercase tracking-widest" data-key="language_select_label">Language</span>
                <div class="grid grid-cols-2 gap-2">
                    <button class="lang-btn p-2 rounded-md bg-primary text-white font-bold" data-lang="ko">한국어</button>
                    <button class="lang-btn p-2 rounded-md bg-gray-50 border border-gray-200" data-lang="en">English</button>
                </div>
            </li>
        </ul>
    </div>
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/20 z-40 hidden"></div>

    <!-- Main Content -->
    <main class="max-w-md mx-auto py-24 px-4 w-full flex-grow flex flex-col">
        <!-- Hero Section -->
        <section class="text-center mb-8">
            <h1 class="text-3xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-b from-primary to-primaryLight" data-key="main_title">운명의 사다리 타기</h1>
            <p class="text-sm text-gray-500" data-key="main_description">팀원들과 함께 운명을 결정해보세요.</p>
        </section>

        <!-- Setup Section -->
        <section id="setup-section" class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest" data-key="setup_title">참가자 설정</h2>
                <div class="flex items-center bg-gray-100 rounded-full px-3 py-1">
                    <button id="player-minus" class="material-icons text-gray-400 hover:text-primary transition-colors text-lg">remove</button>
                    <span id="player-count" class="mx-3 font-bold text-primary w-4 text-center">4</span>
                    <button id="player-plus" class="material-icons text-gray-400 hover:text-primary transition-colors text-lg">add</button>
                </div>
            </div>

            <div id="player-inputs" class="space-y-4">
                <!-- Inputs will be injected here -->
            </div>

            <button id="start-btn" class="w-full mt-8 bg-primary text-white py-4 rounded-2xl text-lg font-bold shadow-lg shadow-primary/20 hover:bg-primaryLight transition-all active:scale-95 flex items-center justify-center gap-2">
                <span class="material-icons">play_arrow</span>
                <span data-key="start_btn">사다리 만들기</span>
            </button>
        </section>

        <!-- Ladder Stage -->
        <section id="ladder-stage" class="hidden flex flex-col items-center">
            <div class="w-full overflow-x-auto no-scrollbar pb-4 mb-6">
                <div id="ladder-container" class="relative bg-white rounded-3xl shadow-inner border border-gray-100 py-10 px-4 min-h-[400px]">
                    <!-- Ladder lines and labels will be here -->
                    <div id="ladder-canvas-container" class="relative w-full h-full">
                        <canvas id="ladder-canvas"></canvas>
                    </div>
                </div>
            </div>

            <div class="flex flex-wrap gap-3 w-full">
                <button id="reset-btn" class="flex-1 min-w-[140px] bg-gray-100 text-gray-600 py-4 rounded-2xl font-bold hover:bg-gray-200 transition-all active:scale-95 flex items-center justify-center gap-2">
                    <span class="material-icons text-lg">refresh</span>
                    <span data-key="reset_btn">다시 설정</span>
                </button>
                <button id="sequential-btn" class="flex-1 min-w-[140px] bg-primary text-white py-4 rounded-2xl font-bold shadow-lg shadow-primary/20 hover:opacity-90 transition-all active:scale-95 flex items-center justify-center gap-2">
                    <span class="material-icons text-lg">play_circle</span>
                    <span data-key="sequential_btn">순차 결과</span>
                </button>
                <button id="all-results-btn" class="flex-1 min-w-[140px] bg-secondary text-white py-4 rounded-2xl font-bold shadow-lg shadow-secondary/20 hover:opacity-90 transition-all active:scale-95 flex items-center justify-center gap-2">
                    <span class="material-icons text-lg">visibility</span>
                    <span data-key="all_results_btn">전체 결과</span>
                </button>
            </div>
        </section>

        <!-- Result Card -->
        <section id="result-section" class="hidden mt-8">
            <div class="bg-gradient-to-br from-primary/5 to-secondary/5 p-6 rounded-3xl border border-primary/10 text-center">
                <h3 class="text-[10px] font-black text-primary uppercase tracking-[0.2em] mb-2" data-key="result_title">결과 확인</h3>
                <div id="result-display" class="text-2xl font-black text-gray-800 break-keep"></div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="py-8 text-center">
        <p class="text-[10px] text-gray-400 mb-2" data-key="fortune_disclaimer">※ 본 서비스의 결과는 재미로만 즐겨주시기 바랍니다.</p>
        <p class="text-[10px] text-gray-400" data-key="footer_copyright">© 2024 Zeze Decision Hub.</p>
    </footer>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="ladderclimb.js" defer></script>

</body>
</html>
