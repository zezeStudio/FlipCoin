    <script>
        const translations = {
            "ko": {
                "meta_title": "오늘 점심 메뉴 고민 해결 팁 - Zeze Hub Insight",
                "category": "라이프스타일 칼럼",
                "main_title": "오늘 점심 뭐 먹지? 결정 피로를 줄이는 5가지 팁",
                "date_info": "작성일: 2024년 10월 27일 · 읽는 시간: 약 5분",
                "back_home": "허브로 돌아가기",
                "summary": "<strong>핵심 요약:</strong><ul class='list-disc ml-5 mt-2 space-y-1'><li>요일별 카테고리를 정하면 선택의 고민을 70% 이상 줄일 수 있습니다.</li><li>결정권자를 미리 정해두는 것만으로도 점심시간의 갈등이 예방됩니다.</li><li>고민이 깊을 때는 주사위 같은 무작위 도구를 활용하는 것이 효과적입니다.</li></ul>",
                "body": `
                    <p>매일 돌아오는 점심시간, "뭐 먹지?"라는 질문은 현대 직장인과 학생들에게 가장 큰 스트레스 중 하나입니다. 사소해 보이지만 이 고민은 우리의 뇌 에너지를 갉아먹습니다. 효율적이고 행복한 식사를 위한 5가지 전략을 소개합니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">1. '요일별 카테고리' 지정하기</h2>
                    <p>월요일은 한식, 화요일은 면 요리, 수요일은 샐러드 등 요일마다 큰 카테고리를 정해두세요. 선택의 범위를 좁히는 것만으로도 뇌의 부담이 70% 이상 줄어듭니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">2. '점심 메이트'에게 결정권 위임하기</h2>
                    <p>매일 돌아가며 결정권자를 정하세요. "아무거나"라고 말하기보다 "오늘은 네가 고르는 날이야"라고 명확히 역할을 맡기면 갈등이 줄어듭니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">3. 나만의 '베스트 3' 리스트 유지</h2>
                    <p>고민하기 싫은 날을 위한 절대 실패하지 않는 단골집 3곳을 리스트업 해두세요. 새로운 도전이 피곤한 날, 이 리스트는 당신의 구세주가 됩니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">4. 날씨와 컨디션에 따른 자동 선택</h2>
                    <p>비가 오면 짬뽕, 스트레스 받는 날은 매운 음식 등 자신만의 공식을 만드세요. 날씨라는 외부 요인이 결정을 대신 내려주게 하는 방법입니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">5. Zeze Hub 도구 활용하기</h2>
                    <p>도저히 못 고르겠다면, 후보 6개를 적고 <a href="../destinydice/destinydice.html" class="text-primary font-bold">운명의 주사위</a>를 굴리세요. 혹은 <a href="../magiclamp/magiclamp.html" class="text-primary font-bold">요술 램프</a>에게 "오늘 돈가스 먹을까요?"라고 물어보세요. 운명에 맡기는 순간, 비로소 당신이 진짜 먹고 싶었던 것이 무엇인지 깨닫게 될 것입니다.</p>
                `
            },
            "en": {
                "meta_title": "What's for Lunch? 5 Tips to Reduce Decision Fatigue - Zeze Hub Insight",
                "category": "Lifestyle Column",
                "main_title": "What's for Lunch?<br>5 Tips to Reduce Decision Fatigue",
                "date_info": "Published: Oct 27, 2024 · Read time: Approx. 5 min",
                "back_home": "Back to Hub",
                "summary": "<strong>Key Takeaways:</strong><ul class='list-disc ml-5 mt-2 space-y-1'><li>Setting daily categories can reduce decision-making stress by over 70%.</li><li>Pre-assigning a decision-maker prevents conflicts during lunchtime.</li><li>Using random tools like dice is effective when you're stuck in indecision.</li></ul>",
                "body": `
                    <p>Lunchtime comes every day, and the question "What should we eat?" is one of the biggest stressors for office workers and students. It seems trivial, but it drains our brain energy. Here are 5 strategies for an efficient and happy meal.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">1. Assign 'Categories by Day'</h2>
                    <p>Set a broad category for each day: Korean on Monday, Noodles on Tuesday, Salad on Wednesday, etc. Narrowing down the options reduces the cognitive load by over 70%.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">2. Delegate to your 'Lunch Mate'</h2>
                    <p>Rotate the decision-maker daily. Instead of saying "Anything is fine," explicitly assign the role: "It's your turn to pick today." This prevents unnecessary conflict.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">3. Maintain a 'Best 3' List</h2>
                    <p>Keep a list of 3 reliable spots for days when you don't want to think. On days when trying something new feels exhausting, this list will be your savior.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">4. Auto-Select by Weather or Mood</h2>
                    <p>Create your own formulas: Spicy food for stressful days, soup for rainy days. Let external factors like weather make the choice for you.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">5. Use Zeze Hub Tools</h2>
                    <p>If you really can't decide, list 6 candidates and roll the <a href="../destinydice/destinydice.html" class="text-primary font-bold">Dice of Destiny</a>. Or ask the <a href="../magiclamp/magiclamp.html" class="text-primary font-bold">Magic Lamp</a>, "Should I have pasta today?" The moment you leave it to fate, you'll realize what you truly wanted.</p>
                `
            }
        };
        let currentLang = localStorage.getItem('lang') || 'ko';
        function applyLanguage() {
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.dataset.key;
                if (translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
            });
            document.getElementById('article-body').innerHTML = translations[currentLang].body;
            if (translations[currentLang].summary) {
                document.getElementById('article-summary').innerHTML = translations[currentLang].summary;
            }
            document.documentElement.lang = currentLang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const btnLang = btn.id.split('-')[1];
                if (btnLang === currentLang) {
                    btn.classList.add('bg-primary', 'text-white', 'border-primary');
                    btn.classList.remove('bg-transparent', 'text-gray-600', 'border-gray-200');
                } else {
                    btn.classList.remove('bg-primary', 'text-white', 'border-primary');
                    btn.classList.add('bg-transparent', 'text-gray-600', 'border-gray-200');
                }
            });
        }
        function setLanguage(lang) { currentLang = lang; localStorage.setItem('lang', lang); applyLanguage(); }
        document.addEventListener('DOMContentLoaded', applyLanguage);
    </script>
