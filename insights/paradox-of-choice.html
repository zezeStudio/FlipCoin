    <script>
        const translations = {
            "ko": {
                "meta_title": "선택의 역설: 왜 많을수록 결정하기 힘들까? - Zeze Hub Insight",
                "category": "심리학 칼럼",
                "main_title": "선택의 역설: 왜 많을수록 결정하기 힘들까?",

                "summary_title": "핵심 요약 (Key Takeaways)",
                "summary": [

                    "맥시마이저보다 만족할 줄 아는 새티스파이저가 더 행복합니다.",
                    "의도적으로 선택의 폭을 제한하는 것이 현명한 결정의 핵심입니다."
                ],
                "body": `
                    <p>우리는 더 많은 자유와 선택권이 있을수록 더 행복해질 것이라고 믿습니다. 하지만 현대 사회의 풍요로움은 때로 우리를 불행하게 만듭니다. 심리학자 배리 슈워츠(Barry Schwartz)는 이를 <strong>'선택의 역설(The Paradox of Choice)'</strong>이라고 명명했습니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">선택지가 많아질 때 발생하는 세 가지 부작용</h2>
                    <ul class="list-disc pl-6 space-y-4">
                        <li><strong>결정 마비 (Analysis Paralysis):</strong> 수많은 옵션을 비교하다가 결국 아무것도 선택하지 못하거나 결정을 무한정 미루게 됩니다.</li>
                        <li><strong>기회비용에 대한 미련:</strong> 한 가지를 선택하면 포기해야 하는 다른 매력적인 옵션들이 떠올라, 선택한 결과에 대한 만족도가 떨어집니다.</li>
                        <li><strong>기대치의 상승:</strong> 선택지가 많으면 "이 중에 완벽한 것이 반드시 있을 것"이라는 기대를 하게 되고, 현실적인 선택 결과에 실망하기 쉽습니다.</li>
                    </ul>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">맥시마이저 vs 새티스파이저</h2>
                    <p>슈워츠는 사람을 두 유형으로 나눕니다. <strong>맥시마이저(Maximizer)</strong>는 모든 대안을 조사하여 최고의 선택을 하려 노력합니다. 반면 <strong>새티스파이저(Satisficer)</strong>는 자신의 기준을 충족하는 첫 번째 옵션을 선택합니다.</p>
                    <p>연구 결과, 맥시마이저는 객관적으로 더 좋은 결과를 얻을 확률이 높지만, 주관적인 행복도는 새티스파이저가 훨씬 높았습니다. 맥시마이저는 선택 후에도 끊임없이 '더 나은 것이 있었을지 모른다'는 후회에 시달리기 때문입니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">해결책: 선택의 폭을 스스로 제한하라</h2>
                    <p>행복한 결정을 내리기 위해서는 의도적으로 선택지를 줄여야 합니다. "오늘 점심은 무조건 이 건물 안에서 해결하겠다"는 식으로 물리적, 심리적 한계를 설정하세요.</p>
                    <p>Zeze Hub의 도구들은 바로 이 지점에서 힘을 발휘합니다. 6개의 선택지만 주사위에 넣거나, 동전의 두 면 중 하나를 고르는 행위는 당신의 뇌를 무한한 가능성의 지옥에서 구출해내는 적극적인 심리 치료 과정입니다.</p>
                `
            },
            "en": {
                "meta_title": "The Paradox of Choice: Why More is Less - Zeze Hub Insight",
                "category": "Psychology Column",
                "main_title": "The Paradox of Choice:<br>Why More is Less",
                "date_info": "Published: Nov 6, 2024 · Read time: Approx. 5 min",
                "back_home": "Back to Hub",
                "summary_title": "Key Takeaways",
                "summary": [
                    "Too many options lead to analysis paralysis and decreased satisfaction.",
                    "Satisficers, who know when to be content, are happier than Maximizers.",
                    "Intentionally limiting choices is the key to making wise decisions."
                ],
                "body": `
                    <p>We believe that more freedom and more choices lead to more happiness. However, the abundance of modern society sometimes makes us miserable. Psychologist Barry Schwartz calls this <strong>'The Paradox of Choice.'</strong></p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">Three Side Effects of Having Too Many Choices</h2>
                    <ul class="list-disc pl-6 space-y-4">
                        <li><strong>Analysis Paralysis:</strong> Comparing endless options leads to indecision or infinite procrastination.</li>
                        <li><strong>Regret over Opportunity Costs:</strong> Choosing one thing makes you think of the attractive options you missed, decreasing overall satisfaction.</li>
                        <li><strong>Escalation of Expectations:</strong> With many choices, we expect one to be "perfect," leading to disappointment with realistic outcomes.</li>
                    </ul>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">Maximizer vs. Satisficer</h2>
                    <p>Schwartz divides people into two types. <strong>Maximizers</strong> try to find the absolute best option by researching everything. <strong>Satisficers</strong> pick the first option that meets their basic criteria.</p>
                    <p>Research shows that while Maximizers might get objectively better results, Satisficers are subjectively happier. Maximizers suffer from constant regret, wondering if there was a better choice.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">Solution: Limit Your Options Intentionally</h2>
                    <p>To make happy decisions, you must intentionally limit your choices. Set physical or psychological boundaries, like "I'll pick lunch from this building only."</p>
                    <p>Zeze Hub's tools work exactly at this point. Putting only 6 options on a dice or choosing between two sides of a coin is an active psychological rescue mission for your brain, saving it from the hell of infinite possibilities.</p>
                `
            }
