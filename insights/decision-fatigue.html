                "summary": "<li>현대인은 하루 수만 번의 선택을 하며, 이 과정에서 뇌 에너지가 소진되는 '결정 피로'를 겪게 됩니다.</li><li>결정 피로가 쌓이면 충동적인 결정을 내리거나 아예 선택을 회피하는 마비 상태에 빠질 수 있습니다.</li><li>루틴을 만들어 사소한 선택을 줄이고, 가벼운 고민은 Zeze Hub와 같은 도구에 맡겨 중요한 결정에 에너지를 집중하세요.</li>",
                "body": `
                    <p>현대인들은 하루 평균 약 3만 5천 번의 결정을 내린다고 합니다. "아침으로 무엇을 먹을까?", "어떤 옷을 입을까?" 같은 사소한 고민부터 업무상의 중요한 판단까지, 끊임없는 선택은 우리의 뇌를 지치게 만듭니다. 이를 심리학에서는 <strong>'결정 피로(Decision Fatigue)'</strong>라고 부릅니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">뇌도 근육처럼 에너지를 소모합니다</h2>
                    <p>결정을 내리는 행위는 뇌의 에너지를 소모하는 고도의 정신 작업입니다. 근육을 과하게 사용하면 지치듯이, 결정을 반복할수록 우리 의지력과 판단력은 저하됩니다. 결정 피로가 쌓이면 사람들은 두 가지 극단적인 행태를 보입니다. 하나는 충동적인 결정이고, 다른 하나는 결정을 아예 회피해버리는 '마비' 상태입니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">성공한 사람들의 비밀: 결정 최소화</h2>
                    <p>스티브 잡스가 매일 같은 검은색 터틀넥을 입고, 마크 저커버그가 같은 회색 티셔츠를 고집하는 이유는 패션 센스가 없어서가 아닙니다. 아침에 옷을 고르는 데 쓰이는 소중한 뇌 에너지를 아껴서, 더 중요한 의사결정에 집중하기 위한 전략입니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">결정 피로를 줄이는 팁</h2>

                "summary_title": "Key Takeaways",
                "summary": "<li>Modern people make tens of thousands of choices daily, leading to 'Decision Fatigue' as brain energy is depleted.</li><li>Accumulated decision fatigue can result in impulsive choices or 'decision paralysis,' where one avoids choosing altogether.</li><li>Focus your energy on important matters by creating routines for trivial tasks and delegating minor choices to tools like Zeze Hub.</li>",
                "body": `
                    <p>Modern people are said to make an average of 35,000 decisions a day. From trivial concerns like "What should I eat for breakfast?" or "What should I wear?" to important business judgments, constant choices wear out our brains. In psychology, this is called <strong>'Decision Fatigue.'</strong></p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">The Brain Consumes Energy Like a Muscle</h2>
                    <p>The act of making a decision is a high-level mental task that consumes brain energy. Just as muscles get tired when overused, our willpower and judgment decline as we repeat decisions. When decision fatigue builds up, people tend to show two extreme behaviors: impulsive decisions or a state of 'paralysis' where they avoid making decisions altogether.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">Secret of Success: Minimizing Decisions</h2>
                    <p>The reason Steve Jobs wore the same black turtleneck every day and Mark Zuckerberg sticks to the same gray T-shirt isn't a lack of fashion sense. It's a strategy to save the precious brain energy used in picking clothes for more important decision-making.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">Tips to Reduce Decision Fatigue</h2>
                    <ul class="list-disc pl-6 space-y-4">
                        <li>Make important decisions in the morning when your brain is clearest.</li>
                        <li>Create daily routines to reduce the number of trivial choices.</li>
                        <li>Delegate light concerns (like menu selection) to Zeze Hub's random tools.</li>
                    </ul>
                `
