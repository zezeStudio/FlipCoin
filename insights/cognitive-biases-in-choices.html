                "summary_title": "핵심 요약",
                "summary": "<li>뇌는 효율을 위해 '휴리스틱'이라는 지름길을 택하지만, 이는 잘못된 결론을 내리는 '인지 편향'의 원인이 됩니다.</li><li>매몰 비용 오류와 확증 편향은 객관적 판단을 방해하는 대표적인 심리적 함정입니다.</li><li>자신의 오류 가능성을 인정하고 Zeze Hub와 같은 무작위 도구를 활용해 주관을 배제하는 것이 편향 극복에 도움을 줍니다.</li>",
                "body": `
                    <p>인간의 뇌는 효율성을 위해 '생각의 지름길'을 택합니다. 이를 심리학에서는 <strong>휴리스틱(Heuristics)</strong>이라고 부릅니다. 하지만 이 지름길은 때로 우리를 잘못된 결론으로 이끄는 '인지 편향'을 낳습니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">1. 매몰 비용 오류 (Sunk Cost Fallacy)</h2>
                    <p>이미 투자한 시간과 돈이 아까워서 좋지 않은 결과를 뻔히 알면서도 그만두지 못하는 현상입니다. 재미없는 영화를 끝까지 보거나, 수익이 나지 않는 주식을 계속 붙들고 있는 것이 대표적입니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">2. 확증 편향 (Confirmation Bias)</h2>
                    <p>자신의 신념과 일치하는 정보만 받아들이고, 반대되는 정보는 무시하는 경향입니다. 보고 싶은 것만 보는 뇌의 습성은 객관적인 판단을 방해합니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">편향에서 벗어나는 법</h2>
                    <p>가장 좋은 방법은 자신의 생각이 틀릴 수 있음을 인정하고 외부의 객관적인 기준을 도입하는 것입니다. 때로는 <a href="../" class="text-primary font-bold">Zeze Hub</a>의 도구들처럼 주관이 완전히 배제된 무작위적 접근이 편향된 뇌를 환기하는 데 도움을 줄 수 있습니다.</p>
                `

                "main_title": "Thought Shortcuts:<br>Common Errors in Our Decisions",
                "date_info": "Published: Nov 11, 2024 · Read time: Approx. 7 min",
                "back_home": "Back to Hub",
                "summary_title": "Key Takeaways",
                "summary": "<li>The brain uses 'heuristics' as shortcuts for efficiency, but these can lead to cognitive biases and incorrect conclusions.</li><li>Sunk cost fallacy and confirmation bias are common psychological traps that hinder objective decision-making.</li><li>Acknowledging your errors and using randomized tools like Zeze Hub can help you bypass subjective bias.</li>",
                "body": `
                    <p>The human brain takes 'thought shortcuts' for efficiency. In psychology, these are called <strong>Heuristics</strong>. However, these shortcuts often lead to 'Cognitive Biases' that steer us toward wrong conclusions.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">1. Sunk Cost Fallacy</h2>
                    <p>This is the tendency to continue an endeavor once an investment in money, effort, or time has been made, even if the current outcome is clearly negative. Watching a boring movie to the end just because you paid for it is a classic example.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">2. Confirmation Bias</h2>
                    <p>The tendency to search for, interpret, and recall information in a way that confirms one's prior beliefs. This habit of seeing only what we want to see prevents objective judgment.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">How to Escape Bias</h2>
                    <p>The best way is to acknowledge that your thoughts could be wrong and introduce objective criteria. Sometimes, a randomized approach like <a href="../" class="text-primary font-bold">Zeze Hub's</a> tools, which completely exclude subjectivity, can help refresh a biased brain.</p>
                `
