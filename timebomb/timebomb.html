<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="app_title">시한 폭탄 돌리기 - Zeze Hub</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="timebomb.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF3D00', // Bomb Red
                        success: '#00E676', // Success Green
                        secondary: '#2979FF',
                        background: '#0A0A0A',
                        surface: '#1A1A1A',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-white font-sans antialiased min-h-screen flex flex-col overflow-x-hidden">

    <!-- Navigation Bar -->
    <nav class="fixed top-0 left-0 right-0 bg-white/5 backdrop-blur-md border-b border-white/10 z-50">
        <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <a href="../index.html" class="p-2 -ml-2 rounded-full hover:bg-white/10 focus:outline-none flex items-center text-primary">
                    <span class="material-icons">arrow_back</span>
                </a>
                <span class="text-xl font-bold text-primary tracking-tighter" data-key="app_name">TIME BOMB</span>
            </div>
            <button id="menu-toggle" class="p-2 rounded-full hover:bg-white/10 focus:outline-none">
                <span class="material-icons text-white">menu</span>
            </button>
        </div>
    </nav>

    <!-- Sidebar Menu -->
    <div id="sidebar-menu" class="fixed top-0 right-0 h-full w-64 bg-surface shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-50 border-l border-white/5">
        <div class="flex items-center justify-between p-4 border-b border-white/10">
            <span class="text-lg font-medium" data-key="menu_sidebar_title">메뉴</span>
            <button id="close-menu" class="p-2 rounded-full hover:bg-white/10">
                <span class="material-icons">close</span>
            </button>
        </div>
        <ul class="p-4 space-y-2 text-sm text-gray-300">
            <li><a href="timebomb-guide.html" class="block w-full text-left p-2 rounded-md hover:bg-white/10" data-key="guide_title">사용 가이드</a></li>
            <li><button id="reset-game-menu" class="block w-full text-left p-2 rounded-md hover:bg-white/10" data-key="reset_btn">게임 초기화</button></li>
            <li><a href="../privacy.html" class="block w-full text-left p-2 rounded-md hover:bg-white/10" data-key="privacy_policy">개인정보처리방침</a></li>
            <li class="py-2"><hr class="border-white/10"></li>
            <li>
                <span class="block text-[10px] text-gray-400 mb-2 uppercase tracking-widest" data-key="language_select_label">Language</span>
                <div class="grid grid-cols-2 gap-2">
                    <button class="lang-btn p-2 rounded-md bg-primary text-white font-bold" data-lang="ko">한국어</button>
                    <button class="lang-btn p-2 rounded-md bg-white/5 border border-white/10" data-lang="en">English</button>
                </div>
            </li>
        </ul>
    </div>
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/80 z-40 hidden"></div>

    <!-- Main Content -->
    <main class="max-w-md mx-auto py-24 px-4 w-full flex-grow flex flex-col items-center justify-center">
        
        <!-- Setup Section -->
        <section id="setup-section" class="w-full space-y-6 animate-fadeIn">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-b from-red-400 to-primary" data-key="main_title">공포의 시한 폭탄</h1>
                <p class="text-xs text-gray-500 uppercase tracking-widest" data-key="setup_desc">참여자를 입력하고 순서를 정하세요.</p>
            </div>
            
            <div class="bg-surface p-6 rounded-3xl border border-white/10 space-y-4">
                <div class="flex justify-between items-center">
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-widest" data-key="label_players">참여자 명단</label>
                    <span id="player-count" class="text-[10px] text-primary font-bold">2/8</span>
                </div>
                <div id="player-inputs" class="space-y-3 max-h-[300px] overflow-y-auto pr-2 no-scrollbar">
                    <!-- Player inputs will be injected here -->
                </div>
                <button id="add-player-btn" class="w-full py-3 border border-dashed border-white/20 rounded-2xl text-xs text-gray-400 hover:bg-white/5 transition-all flex items-center justify-center gap-2">
                    <span class="material-icons text-sm">add</span>
                    <span data-key="add_player">참여자 추가</span>
                </button>
            </div>

            <button id="start-game-btn" class="w-full bg-gradient-to-r from-primary to-orange-700 text-white py-4 rounded-2xl font-black shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all" data-key="start_btn">작전 시작하기</button>
        </section>

        <!-- Game Stage -->
        <section id="game-stage" class="hidden w-full flex flex-col items-center animate-fadeIn">
            
            <div class="bomb-container relative w-full flex flex-col items-center">
                <div id="bomb" class="bomb">
                    <div class="bomb-glare"></div>
                    <div class="timer-panel">
                        <div id="digital-timer" class="font-mono text-3xl text-primary">00:00:00</div>
                    </div>
                    <div class="bomb-fuse">
                        <div class="spark"></div>
                    </div>
                </div>

                <!-- Turn Indicator (Moved here for better focus) -->
                <div id="turn-indicator" class="mt-10 mb-2 px-6 py-3 bg-primary/10 border border-primary/20 rounded-full flex items-center gap-3">
                    <div class="w-2 h-2 bg-primary rounded-full animate-ping"></div>
                    <span class="text-sm font-bold"><span id="current-player-name" class="text-primary text-base mr-1"></span><span data-key="turn_suffix">님 차례입니다!</span></span>
                </div>

                <div id="wires-panel" class="wires-panel mt-6 w-full max-w-[300px]">
                    <!-- Wires generated here -->
                </div>
            </div>

            <!-- Result Banner -->
            <div id="result-banner" class="mt-8 opacity-0 transition-all duration-500 scale-90 text-center pointer-events-none">
                <h2 id="result-title" class="text-4xl font-black mb-2 tracking-tighter">BOOM!</h2>
                <p id="result-desc" class="text-gray-400 text-sm break-keep"></p>
            </div>

            <button id="reset-btn" class="w-full mt-12 bg-white/5 border border-white/10 py-4 rounded-2xl font-bold hover:bg-white/10 transition-all active:scale-95 flex items-center justify-center gap-2">
                <span class="material-icons text-sm">refresh</span>
                <span data-key="new_game_btn">새 게임 시작</span>
            </button>
        </section>
    </main>

    <!-- Footer -->
    <footer class="py-8 text-center mt-auto">
        <p class="text-[10px] text-gray-600 mb-2" data-key="fortune_disclaimer">※ 본 서비스의 결과는 재미로만 즐겨주시기 바랍니다.</p>
        <p class="text-[10px] text-gray-600">© 2024 Zeze Decision Hub.</p>
    </footer>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="timebomb.js" defer></script>

</body>
</html>
